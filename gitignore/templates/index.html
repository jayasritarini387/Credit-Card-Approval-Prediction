<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictive Analysis Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 600;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid #2ecc71;
            border-radius: 3px;
            text-align: center;
            font-weight: bold;
            color: #117a65;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Prediction Input Dashboard</h2>
    <form action="/predict" method="POST">
        <div class="form-group">
            <label for="feature1">Feature Input 1 (e.g., Amount / Factor):</label>
            <input type="number" step="any" id="feature1" name="feature1" required placeholder="Enter value">
        </div>
        <div class="form-group">
            <label for="feature2">Feature Input 2:</label>
            <input type="number" step="any" id="feature2" name="feature2" required placeholder="Enter value">
        </div>
        <div class="form-group">
            <label for="feature3">Feature Input 3:</label>
            <input type="number" step="any" id="feature3" name="feature3" required placeholder="Enter value">
        </div>
        <button type="submit">Generate Prediction</button>
    </form>

    {% if prediction %}
    {% if 'Fraudulent' in prediction %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin-top: 15px; font-weight: bold;">
            Prediction Outcome: {{ prediction }}
        </div>
    {% else %}
        <div style="background-color: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-top: 15px; font-weight: bold;">
            Prediction Outcome: {{ prediction }}
        </div>
    {% endif %}
{% endif %}
</div>

</body>
</html>
